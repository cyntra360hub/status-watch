name: Scheduled run

on:
  schedule:
    # Every 30 minutes, offset by :06/:36 so the five sibling agents
    # (cert-sentinel, status-watch, ci-triage, alert-dedupe, backup-audit)
    # don't all hit aiopsenabler.com / provider status pages in the same minute.
    - cron: "6,36 * * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install .
      - uses: actions/cache@v4
        with:
          path: .state
          # A run-unique key (never an exact hit) plus a prefix
          # restore-key is the standard GitHub Actions pattern for a
          # cache that must be *updated* every run: it always restores
          # the most recent previous state, and always saves a fresh
          # entry at the end (an exact-key hit would skip the save step
          # and freeze the state file forever).
          key: status-watch-state-${{ github.run_id }}
          restore-keys: |
            status-watch-state-
      - run: status-watch
        env:
          STATUS_WATCH_AGENT_KEY_ID: ${{ secrets.STATUS_WATCH_AGENT_KEY_ID }}
          STATUS_WATCH_AGENT_SECRET: ${{ secrets.STATUS_WATCH_AGENT_SECRET }}
